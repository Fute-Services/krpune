name: Build Windows App

# Builds the Electron app into a Windows installer (.exe) and publishes it as a
# downloadable artifact + a "latest" GitHub Release on every push to main.
# You can also trigger it by hand from the Actions tab (Run workflow).

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed to create/update the GitHub Release

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        # vite build + electron-builder --win nsis  (same as `npm run app:dist`)
        run: npm run app:dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: KRC-Pune-Windows-Installer
          path: release/*.exe
          if-no-files-found: error

      - name: Publish "latest" Release with installer
        # Runs on branch pushes (main) and tag pushes. Gives a stable download link.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest Windows Build' }}
          files: release/*.exe
          fail_on_unmatched_files: true

      - name: Show download link in the build summary
        # After every build this prints a clickable download link on the
        # Actions run page (the "Summary" tab), so there's no need to hunt for it.
        shell: bash
        run: |
          TAG='${{ startsWith(github.ref, ''refs/tags/'') && github.ref_name || ''latest'' }}'
          EXE=$(ls release/*.exe | head -1)
          NAME=$(basename "$EXE" | sed 's/ /./g')
          URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${NAME}"
          {
            echo "## ✅ Windows build ready"
            echo ""
            echo "**Download the installer:**"
            echo ""
            echo "👉 [$NAME]($URL)"
            echo ""
            echo "Release page: https://github.com/${{ github.repository }}/releases/tag/${TAG}"
          } >> "$GITHUB_STEP_SUMMARY"
