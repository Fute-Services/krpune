name: Build Windows App

# Builds the Electron app into a Windows installer (.exe) and publishes it as a
# downloadable artifact + a "latest" GitHub Release on every push to main.
# You can also trigger it by hand from the Actions tab (Run workflow).

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed to create/update the GitHub Release

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true   # pull the real .mp4 videos (stored via Git LFS), not pointer files

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22   # 20 is deprecated on GitHub runners; 22 is current LTS
          cache: npm
          cache-dependency-path: code/package-lock.json   # lock file lives in code/, not repo root

      - name: Install dependencies
        working-directory: code
        run: npm ci

      - name: Build Windows installer
        # vite build + electron-builder --win nsis  (same as `npm run app:dist`)
        #
        # Code signing: if the WINDOWS_CERT_BASE64 / WINDOWS_CERT_PASSWORD repo
        # secrets are set, electron-builder picks them up automatically via the
        # CSC_LINK / CSC_KEY_PASSWORD env vars and signs the installer + exe.
        # If the secrets are empty, the build stays unsigned (as before) and
        # still succeeds — so nothing breaks until the certificate is added.
        working-directory: code
        run: npm run app:dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.WINDOWS_CERT_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}

      - name: Upload installer as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: KRC-Pune-Windows-Installer
          path: code/release/*.exe
          if-no-files-found: error

      - name: Delete old "latest" release so the new one shows a fresh date
        # On branch (main) builds we reuse the "latest" tag. GitHub shows a
        # reused release's ORIGINAL creation date in the sidebar ("2 days ago"),
        # which looks stale even though the installer is freshly rebuilt. Deleting
        # the old release + tag first makes the next step recreate it with today's
        # date, so it always reads as up to date.
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --repo "${{ github.repository }}" --cleanup-tag --yes || true

      - name: Publish "latest" Release with installer
        # Runs on branch pushes (main) and tag pushes. Gives a stable download link.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest Windows Build' }}
          files: code/release/*.exe
          fail_on_unmatched_files: true
          # Put a big clickable download link right in the release description so
          # there's no need to expand the "Assets" section to find the installer.
          body: |
            ## ⬇️ Download the Windows app

            ### 👉 [**Click here to download KRC Pune (Windows installer, ~1 GB)**](https://github.com/${{ github.repository }}/releases/download/latest/KRC.Pune.Setup.0.0.0.exe)

            After it downloads, double-click the `.exe` to install.

            You can share this same link with anyone — it always points to the latest build.

      - name: Show download link in the build summary
        # After every build this prints a clickable download link on the
        # Actions run page (the "Summary" tab), so there's no need to hunt for it.
        shell: bash
        run: |
          TAG='${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}'
          EXE=$(ls code/release/*.exe | head -1)
          NAME=$(basename "$EXE" | sed 's/ /./g')
          URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${NAME}"
          {
            echo "## ✅ Windows build ready"
            echo ""
            echo "**Download the installer:**"
            echo ""
            echo "👉 [$NAME]($URL)"
            echo ""
            echo "Release page: https://github.com/${{ github.repository }}/releases/tag/${TAG}"
          } >> "$GITHUB_STEP_SUMMARY"
